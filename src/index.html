<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<script>
  // Define o tema (claro/escuro) antes da primeira pintura da página,
  // para não haver "piscada" de tela clara em quem prefere o modo escuro.
  (function () {
    try {
      var prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
      document.documentElement.setAttribute('data-theme', prefersDark ? 'dark' : 'light');
    } catch (e) {
      document.documentElement.setAttribute('data-theme', 'light');
    }
  })();
</script>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Descobrindo Poços de Caldas — Quiz</title>
<meta name="description" content="Quiz interativo e 100% visual sobre os pontos turísticos de Poços de Caldas, com dicas e fotos de recompensa.">
<link rel="icon" type="image/png" href="images/logo_pocos.png">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700;800&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">

<link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Fundo decorativo de bolhas (puramente visual) -->
  <div class="bubbles-bg" aria-hidden="true">
    <span class="bubble b1"></span>
    <span class="bubble b2"></span>
    <span class="bubble b3"></span>
    <span class="bubble b4"></span>
    <span class="bubble b5"></span>
    <span class="bubble b6"></span>
  </div>

  <header class="app-header">
    <div class="app-header__brand">
      <img src="images/logo_pocos.png" class="app-header__icon" alt="" aria-hidden="true" style="height: 32px; width: auto; object-fit: contain;">
      <span class="app-header__title">Poços de Caldas</span>
    </div>
    <button id="theme-toggle" class="icon-btn" type="button" aria-label="Mudar para tema escuro">
      <span id="theme-icon" aria-hidden="true">🌙</span>
    </button>
  </header>

  <main class="app-main">

    <!-- ======================= TELA INICIAL ======================= -->
    <section id="start-screen" class="screen" aria-labelledby="start-title">
      <div class="hero-card card">
        <p class="eyebrow">Quiz Turístico</p>
        <h1 id="start-title" class="hero-title">Descobrindo<br>Poços de Caldas</h1>
        
        <button id="start-btn" class="btn btn--primary btn--lg" type="button">Começar Quiz</button>
      </div>
    </section>

    <!-- ======================= TELA DO QUIZ ======================= -->
    <section id="quiz-screen" class="screen" aria-labelledby="quiz-heading" hidden>
      <h2 id="quiz-heading" class="sr-only">Pergunta do quiz</h2>

      <div class="quiz-topbar">
        <div class="progress-info">
          <span id="question-counter">Pergunta 1 de 20</span>
          <span id="score-display" class="score-pill">⭐ 0 pontos</span>
        </div>
        <div id="progress-track" class="progress-track" role="progressbar" aria-valuemin="0" aria-valuemax="20" aria-valuenow="0" aria-label="Progresso do quiz">
          <div id="progress-fill" class="progress-fill"></div>
        </div>
      </div>

      <div class="question-card card">
        <!-- Corpo da pergunta -->
        <div id="question-body">
          <p class="question-text" id="question-text"></p>

          <div class="options-grid" id="options-grid" role="group" aria-label="Alternativas de resposta"></div>

          <button id="hint-btn" class="btn btn--tonal btn--sm hint-toggle" type="button" aria-expanded="false" aria-controls="hint-panel">
            <span aria-hidden="true">💡</span> Ver Dica
          </button>
          <div class="hint-panel" id="hint-panel">
            <div class="hint-panel__inner">
              <p id="hint-text"></p>
            </div>
          </div>
        </div>

        <!-- Bloco de feedback (aparece após responder) -->
        <div class="feedback-block" id="feedback-block" hidden aria-live="polite">
          <div class="feedback-icon" id="feedback-icon" aria-hidden="true"></div>
          <h3 class="feedback-title" id="feedback-title"></h3>
          <p class="feedback-text" id="feedback-text"></p>

          <div class="feedback-image-wrap" id="feedback-image-wrap" hidden>
            <img id="feedback-image" class="feedback-image" alt="">
            <p class="feedback-image-caption" id="feedback-image-caption"></p>
          </div>

          <button id="next-btn" class="btn btn--primary btn--lg" type="button">Próxima Pergunta</button>
        </div>
      </div>
    </section>

    <!-- ======================= TELA FINAL ======================= -->
    <section id="end-screen" class="screen" aria-labelledby="end-title" hidden>
      <div class="hero-card card">
        <div class="end-emoji" id="end-emoji" aria-hidden="true">🏆</div>
        <h2 id="end-title" class="hero-title">Quiz Concluído!</h2>
        <p class="end-score" id="end-score">0 / 20</p>
        <p class="end-message" id="end-message"></p>
        <button id="restart-btn" class="btn btn--primary btn--lg" type="button">Jogar Novamente</button>
      </div>
    </section>

  </main>

  <footer class="app-footer">
    <p>Feito com 💛 para conhecer Poços de Caldas</p>
  </footer>

  <div id="confetti-layer" class="confetti-layer" aria-hidden="true"></div>

  <script src="script.js" defer></script>
</body>
</html>
